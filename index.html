<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idea Agent — Ghi nhận & Phát triển Ý tưởng</title>
    <meta name="description" content="Hệ thống ghi nhận, phân loại và phát triển ý tưởng với AI - Powered by Gemini">
    <meta name="theme-color" content="#8b5cf6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/capture.css">
    <link rel="stylesheet" href="css/timeline.css">
    <link rel="stylesheet" href="css/draft.css">
    <link rel="stylesheet" href="css/mobile.css">
</head>
<body>
    <div id="app">
        <!-- Mobile Header -->
        <div class="mobile-header" id="mobile-header">
            <div class="mobile-header-left">
                <button class="mobile-menu-btn" onclick="App.toggleSidebar()">☰</button>
                <span class="mobile-header-title">💡 Idea Agent</span>
            </div>
            <div>
                <button class="btn btn-icon btn-ghost" onclick="App.toggleTheme()" id="mobile-theme-btn">🌙</button>
            </div>
        </div>

        <!-- Sidebar Overlay (mobile) -->
        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <div class="logo-icon">💡</div>
                <div class="logo-text">
                    <span class="logo-title">Idea Agent</span>
                    <span class="logo-subtitle">Ghi nhận & Phát triển ý tưởng</span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-section-title">CHÍNH</div>
                <a href="#capture" class="nav-item active" data-page="capture" onclick="App.closeSidebar()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
                    <span>Ghi nhận</span>
                </a>
                <a href="#timeline" class="nav-item" data-page="timeline" onclick="App.closeSidebar()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                    <span>Timeline</span>
                    <span class="nav-badge" id="nav-timeline-badge" style="display:none">0</span>
                </a>

                <div class="nav-section-title" style="margin-top: var(--space-md)">PHÂN TÍCH</div>
                <a href="#analytics" class="nav-item" data-page="analytics" onclick="App.closeSidebar()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg>
                    <span>Phân tích</span>
                </a>

                <div class="nav-section-title" style="margin-top: var(--space-md)">HỆ THỐNG</div>
                <a href="#settings" class="nav-item" data-page="settings" onclick="App.closeSidebar()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                    <span>Cài đặt</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="sidebar-footer-content">
                    <div class="sidebar-stats" id="sidebar-stats">
                        <div class="sidebar-stat">💡 <strong>0</strong> ý tưởng</div>
                        <div class="sidebar-stat">📝 <strong>0</strong> bản thảo</div>
                    </div>
                    <button class="theme-toggle" id="theme-toggle-btn" onclick="App.toggleTheme()" title="Đổi theme">
                        🌙
                    </button>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content" id="main-content">
            <!-- Pages rendered here by JS -->
        </main>
    </div>

    <!-- Modal Container -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal" id="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="modal-title"></h3>
                <button class="modal-close" id="modal-close" onclick="App.closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/store.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/gemini.js"></script>
    <script src="js/capture.js"></script>
    <script src="js/timeline.js"></script>
    <script src="js/draft.js"></script>
    <script src="js/analytics.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
